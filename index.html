<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>英語テスト 成績管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --ink:#0f1117;--ink2:#3a3f52;--muted:#8891aa;
  --bg:#f0f2f7;--surface:#fff;--border:#e0e4ef;
  --navy:#1b2952;--navy2:#253470;
  --gold:#c8a84b;--gold-pale:#faf3e0;
  --red:#c94040;--red-pale:#fdf0f0;
  --green:#2a7a52;--green-pale:#edf7f2;
  --blue:#2555b8;--blue-pale:#eef2fc;
  --orange:#c06010;--orange-pale:#fff5eb;
  --purple:#6030b0;--purple-pale:#f3eeff;
  --font:'Noto Sans JP',sans-serif;
  --mono:'DM Mono',monospace;
  --radius:14px;
  --shadow:0 4px 24px rgba(15,17,40,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* ── screens ── */
.screen{display:none;width:100%;max-width:480px;padding:0 0 60px;}
.screen.active{display:block;}
.screen-wide{max-width:1060px;}

/* ── login ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.login-logo{width:64px;height:64px;background:var(--navy);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(27,41,82,.25);}
.login-title{font-size:22px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;}
.login-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:28px 24px;box-shadow:var(--shadow);width:100%;max-width:360px;}
.login-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;}
.login-tab{flex:1;padding:9px;border:none;background:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--muted);border-radius:8px;cursor:pointer;transition:.15s;}
.login-tab.active{background:var(--surface);color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.form-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font);color:var(--ink);background:var(--bg);transition:.15s;margin-bottom:16px;}
.form-input:focus{outline:none;border-color:var(--navy);background:white;box-shadow:0 0 0 3px rgba(27,41,82,.08);}
.btn-primary{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,41,82,.2);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.error-msg{background:var(--red-pale);color:var(--red);border:1px solid #f5c6c6;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.error-msg.show{display:block;}

/* ── page header ── */
.page-header{background:var(--navy);color:white;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.page-header h1{font-size:15px;font-weight:700;flex:1;}
.user-chip{background:rgba(255,255,255,.15);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:600;}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.3);color:white;border-radius:8px;padding:5px 12px;font-size:12px;font-family:var(--font);cursor:pointer;transition:.15s;}
.logout-btn:hover{background:rgba(255,255,255,.1);}

/* ── cards ── */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px 20px 0;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.section-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--gold);border-radius:2px;}

/* ── stat boxes ── */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;flex:1;min-width:80px;}
.stat-num{font-size:24px;font-weight:700;font-family:var(--mono);}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;}

/* ── badges ── */
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-green{background:var(--green-pale);color:var(--green);}
.badge-red{background:var(--red-pale);color:var(--red);}
.badge-blue{background:var(--blue-pale);color:var(--blue);}
.badge-gold{background:var(--gold-pale);color:#7a5a00;}
.badge-orange{background:var(--orange-pale);color:var(--orange);}
.badge-purple{background:var(--purple-pale);color:var(--purple);}
.badge-gray{background:var(--bg);color:var(--muted);}

/* ── progress ── */
.progress-bg{background:var(--border);border-radius:99px;height:7px;}
.progress-fill{height:100%;border-radius:99px;transition:width .3s;}

/* ── rank medal ── */
.rank-medal{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:700;flex-shrink:0;}
.medal-1{background:#ffd700;color:#5a3e00;}
.medal-2{background:#c8c8c8;color:#3a3a3a;}
.medal-3{background:#cd7f32;color:#2a1000;}
.medal-n{background:var(--border);color:var(--muted);font-size:12px;}

/* ── student dashboard ── */
.student-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:40;}
.student-nav-btn{flex:1;padding:12px 8px;border:none;background:none;font-family:var(--font);font-size:12px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:.15s;}
.student-nav-btn.active{color:var(--navy);border-bottom-color:var(--navy);}
.student-tab{display:none;padding-bottom:40px;}
.student-tab.active{display:block;}

/* test row in student view */
.test-row{padding:14px 0;border-bottom:1px solid var(--border);}
.test-row:last-child{border-bottom:none;}
.test-row-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.test-row-name{font-weight:700;font-size:14px;flex:1;}
.score-display{font-family:var(--mono);font-weight:700;font-size:18px;}

/* ranking card */
.ranking-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.ranking-row:last-child{border-bottom:none;}
.ranking-row.me{background:var(--blue-pale);margin:0 -20px;padding:10px 20px;border-radius:8px;}

/* ── admin ── */
.admin-header{background:var(--ink);color:white;padding:0;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,.3);}
.admin-header-inner{display:flex;align-items:center;gap:12px;padding:14px 20px;}
.admin-header h1{font-size:16px;font-weight:700;flex:1;color:var(--gold);}
.admin-nav{display:flex;background:rgba(255,255,255,.07);overflow-x:auto;}
.admin-nav-btn{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.6);padding:10px 18px;font-size:13px;font-family:var(--font);font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;}
.admin-nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.admin-nav-btn:hover:not(.active){color:white;}
.admin-page{display:none;padding:24px 20px;max-width:1060px;margin:0 auto;}
.admin-page.active{display:block;}

/* score entry grid */
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.score-entry-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px;transition:.15s;}
.score-entry-card.done{border-color:var(--green);background:var(--green-pale);}
.score-entry-card.retest{border-color:var(--red);background:var(--red-pale);}
.score-entry-card.expired-sub{border-color:var(--orange);background:var(--orange-pale);}
.student-name-label{font-weight:700;font-size:13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.score-inp{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:18px;font-weight:700;font-family:var(--mono);text-align:center;background:var(--bg);color:var(--navy);transition:.15s;}
.score-inp:focus{outline:none;border-color:var(--navy);background:white;box-shadow:0 0 0 3px rgba(27,41,82,.08);}
.score-pct-sm{text-align:center;font-size:12px;font-weight:700;margin-top:5px;height:18px;}

/* table */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--ink);color:rgba(255,255,255,.85);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.4px;white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8f9fd;}

/* buttons */
.btn-sm{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;transition:.12s;}
.btn-navy{background:var(--navy);color:white;}
.btn-navy:hover{background:var(--navy2);}
.btn-ghost{background:var(--bg);color:var(--ink2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--border);}
.btn-red{background:var(--red-pale);color:var(--red);}
.btn-red:hover{background:#fcd8d8;}
.btn-green{background:var(--green-pale);color:var(--green);border:1px solid #a0d8bc;}
.btn-green:hover{background:#d0efe0;}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal-box{background:var(--surface);border-radius:18px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.3);position:relative;}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* input helpers */
.inp{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:var(--font);color:var(--ink);background:var(--bg);transition:.15s;}
.inp:focus{outline:none;border-color:var(--navy);background:white;}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-group.full{grid-column:1/-1;}

/* calendar */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.cal-nav h2{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--navy);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-weekday{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px;}
.cal-cell{min-height:68px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px;cursor:pointer;transition:.12s;}
.cal-cell:hover{border-color:var(--navy);}
.cal-cell.today{border-color:var(--navy);border-width:2px;}
.cal-cell.other{opacity:.3;cursor:default;pointer-events:none;}
.cal-num{font-size:12px;font-weight:600;color:var(--muted);}
.cal-dot{font-size:9px;border-radius:4px;padding:1px 4px;margin-top:2px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:white;}
.cal-dot.sub{background:var(--navy);}
.cal-dot.dl{background:var(--orange);}
.cal-dot.warn{background:var(--red);}

/* deadline badge */
.dl-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;}
.dl-ok{background:var(--green-pale);color:var(--green);}
.dl-warn{background:var(--orange-pale);color:var(--orange);}
.dl-over{background:var(--red-pale);color:var(--red);}

/* big score display */
.big-pct{font-size:48px;font-weight:700;font-family:var(--mono);line-height:1;}
.big-rank{font-size:32px;font-weight:700;font-family:var(--mono);}

/* overall ranking table highlight */
.hl-me td{background:var(--blue-pale)!important;font-weight:700;}

@media(max-width:600px){
  .input-row{grid-template-columns:1fr;}
  .admin-page{padding:14px;}
  .score-grid{grid-template-columns:1fr;}
  .cal-cell{min-height:52px;}
  .section-card{margin:12px 12px 0;}
}
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="screen-login" class="screen active">
<div class="login-wrap">
  <div class="login-logo">📊</div>
  <div class="login-title">英語テスト 成績管理</div>
  <div class="login-sub">羽田国際高等学校</div>
  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('student')">生徒ログイン</button>
      <button class="login-tab" onclick="switchLoginTab('admin')">管理者</button>
    </div>
    <div id="login-student">
      <label class="form-label">名前</label>
      <input id="inp-name" class="form-input" type="text" placeholder="例: 山田太郎" onkeydown="if(event.key==='Enter')document.getElementById('inp-password').focus()">
      <label class="form-label">パスワード</label>
      <input id="inp-password" class="form-input" type="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')loginStudent()">
      <div class="error-msg" id="student-err"></div>
      <button class="btn-primary" onclick="loginStudent()">ログイン</button>
    </div>
    <div id="login-admin" style="display:none">
      <label class="form-label">管理者パスワード</label>
      <input id="inp-admin-pw" class="form-input" type="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')loginAdmin()">
      <div class="error-msg" id="admin-err"></div>
      <button class="btn-primary" onclick="loginAdmin()">管理者としてログイン</button>
    </div>
  </div>
</div>
</div>

<!-- ════ STUDENT VIEW ════ -->
<div id="screen-student" class="screen">
  <div class="page-header">
    <h1>📊 成績ダッシュボード</h1>
    <span class="user-chip" id="student-chip"></span>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
  <div class="student-nav">
    <button class="student-nav-btn active" onclick="studentTab('overview')">📈 概要</button>
    <button class="student-nav-btn" onclick="studentTab('tests')">📝 テスト一覧</button>
    <button class="student-nav-btn" onclick="studentTab('ranking')">🏆 ランキング</button>
  </div>

  <!-- 概要タブ -->
  <div id="stab-overview" class="student-tab active">
    <div class="section-card">
      <div class="section-title">サマリー</div>
      <div id="student-summary-stats" class="stats-row"></div>
    </div>
    <!-- 平均点の推移 -->
    <div class="section-card">
      <div class="section-title">テストごとの成績</div>
      <div id="student-overview-list"></div>
      <div id="student-no-data" style="display:none;text-align:center;padding:32px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:8px">📋</div>
        まだ成績が登録されていません
      </div>
    </div>
  </div>

  <!-- テスト一覧タブ -->
  <div id="stab-tests" class="student-tab">
    <div class="section-card">
      <div class="section-title">テスト別成績詳細</div>
      <div id="student-tests-list"></div>
    </div>
  </div>

  <!-- ランキングタブ -->
  <div id="stab-ranking" class="student-tab">
    <!-- 平均点ランキング -->
    <div class="section-card">
      <div class="section-title">🏆 平均点クラスランキング</div>
      <div id="student-avg-ranking"></div>
    </div>
    <!-- テスト別ランキング選択 -->
    <div class="section-card">
      <div class="section-title">テスト別ランキング</div>
      <select id="student-rank-sel" class="inp" style="width:100%;margin-bottom:14px" onchange="renderStudentTestRanking()"></select>
      <div id="student-test-ranking"></div>
    </div>
  </div>
</div>

<!-- ════ ADMIN ════ -->
<div id="screen-admin" class="screen screen-wide" style="padding:0;max-width:100%">
  <div class="admin-header">
    <div class="admin-header-inner">
      <h1>📊 管理者ダッシュボード</h1>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
    <div class="admin-nav">
      <button class="admin-nav-btn active" onclick="adminTab('dash')">ダッシュボード</button>
      <button class="admin-nav-btn" onclick="adminTab('entry')">✏️ 点数入力</button>
      <button class="admin-nav-btn" onclick="adminTab('tests')">テスト管理</button>
      <button class="admin-nav-btn" onclick="adminTab('ranking')">ランキング</button>
      <button class="admin-nav-btn" onclick="adminTab('history')">全履歴</button>
      <button class="admin-nav-btn" onclick="adminTab('calendar')">カレンダー</button>
      <button class="admin-nav-btn" onclick="adminTab('students')">生徒管理</button>
    </div>
  </div>

  <!-- DASH -->
  <div id="admin-dash" class="admin-page active">
    <div id="admin-stats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="section-card" style="margin:0"><div class="section-title">要再テスト</div><div id="admin-retest"></div></div>
      <div class="section-card" style="margin:0"><div class="section-title">最新の登録</div><div id="admin-recent"></div></div>
    </div>
    <div class="section-card" style="margin:0;border-color:#f5c090">
      <div class="section-title" style="color:var(--orange)">⏰ 期限切れ・未入力</div>
      <div id="admin-overdue"></div>
    </div>
  </div>

  <!-- ENTRY -->
  <div id="admin-entry" class="admin-page">
    <div class="section-card" style="margin:0 0 16px">
      <div class="section-title">テストを選択して点数を入力</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div class="input-group" style="flex:1;min-width:200px">
          <label class="form-label">テスト</label>
          <select id="entry-test-sel" class="inp" onchange="renderEntryGrid()"></select>
        </div>
        <div class="input-group">
          <label class="form-label">種別</label>
          <select id="entry-type-sel" class="inp" onchange="renderEntryGrid()">
            <option value="normal">通常テスト</option>
            <option value="retest">再テスト</option>
          </select>
        </div>
        <button class="btn-sm btn-green" onclick="saveAllScores()" id="entry-save-btn">💾 全員まとめて保存</button>
      </div>
      <div id="entry-test-info" style="margin-top:10px;font-size:12px;color:var(--muted)"></div>
    </div>
    <!-- 入力グリッド -->
    <div id="entry-grid-wrap">
      <div style="text-align:center;padding:40px;color:var(--muted)">テストを選択してください</div>
    </div>
    <!-- 一括確認 -->
    <div id="entry-summary" style="display:none" class="section-card" style="margin-top:16px">
      <div class="section-title">保存確認</div>
      <div id="entry-summary-body"></div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn-sm btn-ghost" onclick="document.getElementById('entry-summary').style.display='none'">キャンセル</button>
        <button class="btn-sm btn-navy" onclick="confirmSaveScores()">✅ 確定して保存</button>
      </div>
    </div>
  </div>

  <!-- TESTS -->
  <div id="admin-tests" class="admin-page">
    <div class="section-card" style="margin:0 0 16px">
      <div class="section-title">テストを新規作成</div>
      <div class="input-row">
        <div class="input-group"><label class="form-label">テスト名 *</label><input id="t-name" class="inp" placeholder="例: Unit3 期末テスト"></div>
        <div class="input-group"><label class="form-label">実施日 *</label><input id="t-date" class="inp" type="date"></div>
        <div class="input-group"><label class="form-label">満点 *</label><input id="t-max" class="inp" type="number" value="100" min="1"></div>
        <div class="input-group"><label class="form-label">再テスト閾値（%）</label><input id="t-thresh" class="inp" type="number" value="80" min="0" max="100"></div>
        <div class="input-group full">

<script>
// ════ STATE ════
let ADMIN_PW   = localStorage.getItem('ets_admin_pw') || '0000';
let students   = JSON.parse(localStorage.getItem('ets_students') || '[]');
let tests      = JSON.parse(localStorage.getItem('ets_tests')    || '[]');
let submissions= JSON.parse(localStorage.getItem('ets_subs')     || '[]');
// submission: {id, testId, testName, studentNumber, studentName, score, maxScore, threshold, pct, needsRetest, isRetest, isExpiredSubmission, submittedAt, date}

let currentUser = null;
let pendingScores = {}; // {studentNumber: score} for batch entry
let calY, calM;
const today = new Date();
calY = today.getFullYear(); calM = today.getMonth();

function save() {
  localStorage.setItem('ets_students', JSON.stringify(students));
  localStorage.setItem('ets_tests',    JSON.stringify(tests));
  localStorage.setItem('ets_subs',     JSON.stringify(submissions));
  localStorage.setItem('ets_admin_pw', ADMIN_PW);
}

// ── helpers ──
function isDeadlinePassed(t) { return t.deadline && new Date() > new Date(t.deadline); }
function deadlineLabel(t) {
  if (!t.deadline) return '';
  const diff = new Date(t.deadline) - new Date();
  if (diff < 0) return '期限切れ';
  const h = Math.floor(diff/3600000);
  return h < 24 ? `残り約${h}時間` : `残り${Math.floor(diff/86400000)}日`;
}
function pctColor(pct) { return pct>=80?'var(--green)':pct>=60?'#c08000':'var(--red)'; }
function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
function hideErr(id){document.getElementById(id).classList.remove('show');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

// 生徒ごとの全テスト平均パーセント
function studentAvgPct(num) {
  const subs = submissions.filter(s=>s.studentNumber===num && !s.isRetest);
  if (!subs.length) return null;
  return Math.round(subs.reduce((a,b)=>a+b.pct,0)/subs.length);
}

// 期限切れ未入力リスト
function getOverdueList() {
  const r=[];
  tests.forEach(t=>{
    if(!t.deadline || !isDeadlinePassed(t)) return;
    students.forEach(s=>{
      if(!submissions.find(x=>x.testId===t.id&&x.studentNumber===s.number&&!x.isRetest))
        r.push({test:t,student:s});
    });
  });
  return r;
}

// ════ LOGIN ════
function switchLoginTab(tab){
  document.querySelectorAll('.login-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='student')||(i===1&&tab==='admin')));
  document.getElementById('login-student').style.display=tab==='student'?'':'none';
  document.getElementById('login-admin').style.display=tab==='admin'?'':'none';
}

function loginStudent(){
  hideErr('student-err');
  const name=document.getElementById('inp-name').value.trim();
  const pw=document.getElementById('inp-password').value;
  if(!name){showErr('student-err','名前を入力してください');return;}
  if(!pw){showErr('student-err','パスワードを入力してください');return;}
  const st=students.find(s=>s.name===name);
  if(!st){showErr('student-err','名前が登録されていません。管理者に確認してください');return;}
  const expected='02'+String(st.number).padStart(2,'0');
  if(pw!==expected){showErr('student-err','パスワードが違います');document.getElementById('inp-password').value='';return;}
  currentUser={number:st.number,name:st.name};
  document.getElementById('student-chip').textContent=st.name;
  renderStudentView();
  showScreen('screen-student');
}

function loginAdmin(){
  hideErr('admin-err');
  if(document.getElementById('inp-admin-pw').value!==ADMIN_PW){showErr('admin-err','パスワードが違います');return;}
  renderAdminDash();
  showScreen('screen-admin');
}

function logout(){
  currentUser=null;pendingScores={};
  document.getElementById('inp-name').value='';
  document.getElementById('inp-password').value='';
  document.getElementById('inp-admin-pw').value='';
  hideErr('student-err');hideErr('admin-err');
  showScreen('screen-login');
}

// ════ STUDENT VIEW ════
function studentTab(tab){
  document.querySelectorAll('.student-nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.student-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('stab-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab==='ranking') renderStudentRankingTab();
  if(tab==='tests')   renderStudentTestsTab();
}

function renderStudentView(){
  renderStudentOverview();
  renderStudentTestsTab();
  // populate test selector for ranking tab
  const sel=document.getElementById('student-rank-sel');
  sel.innerHTML=tests.length
    ? [...tests].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`<option value="${t.id}">${t.date} — ${t.name}</option>`).join('')
    : '<option>テストがありません</option>';
}

function renderStudentOverview(){
  const num=currentUser.number;
  const mySubs=submissions.filter(s=>s.studentNumber===num&&!s.isRetest);
  const noData=document.getElementById('student-no-data');
  const listEl=document.getElementById('student-overview-list');

  if(!mySubs.length){
    document.getElementById('student-summary-stats').innerHTML='<div style="color:var(--muted);font-size:13px">まだデータがありません</div>';
    noData.style.display='';listEl.style.display='none';return;
  }
  noData.style.display='none';listEl.style.display='';

  const myAvg=Math.round(mySubs.reduce((a,s)=>a+s.pct,0)/mySubs.length);
  const passCount=mySubs.filter(s=>!s.needsRetest).length;
  const retestCount=mySubs.filter(s=>s.needsRetest).length;

  // クラス内平均ランキング（全員の平均でランク付け）
  const allAvgs=students.map(s=>({num:s.number,avg:studentAvgPct(s.number)})).filter(x=>x.avg!==null);
  allAvgs.sort((a,b)=>b.avg-a.avg);
  const myAvgRank=allAvgs.findIndex(x=>x.num===num)+1;

  document.getElementById('student-summary-stats').innerHTML=`
    <div class="stat-box"><div class="stat-num">${mySubs.length}</div><div class="stat-label">受験数</div></div>
    <div class="stat-box"><div class="stat-num" style="color:${pctColor(myAvg)}">${myAvg}%</div><div class="stat-label">平均点率</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green)">${passCount}</div><div class="stat-label">合格</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--red)">${retestCount}</div><div class="stat-label">再テスト</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--purple)">${myAvgRank>0?myAvgRank+'位':'—'}</div><div class="stat-label">平均ランク</div></div>
  `;

  listEl.innerHTML=mySubs.sort((a,b)=>b.date.localeCompare(a.date)).map(s=>{
    const allForTest=submissions.filter(x=>x.testId===s.testId&&!x.isRetest);
    const rank=allForTest.filter(x=>x.score>s.score).length+1;
    const total=allForTest.length;
    const classAvg=total?Math.round(allForTest.reduce((a,x)=>a+x.pct,0)/total):null;
    const bar=pctColor(s.pct);
    const medal=rank===1?'medal-1':rank===2?'medal-2':rank===3?'medal-3':'medal-n';
    return `<div class="test-row">
      <div class="test-row-header">
        <div class="test-row-name">${s.testName}</div>
        <span class="badge ${s.needsRetest?'badge-red':'badge-green'}">${s.needsRetest?'再テスト':'✓ 合格'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">
        <span class="score-display" style="color:${bar}">${s.score}<span style="font-size:13px;color:var(--muted)">/${s.maxScore}</span></span>
        <span style="font-weight:700;color:${bar}">${s.pct}%</span>
        <span class="rank-medal ${medal}" title="順位">${rank}</span>
        <span style="font-size:12px;color:var(--muted)">/${total}人中</span>
        ${classAvg!==null?`<span style="font-size:12px;color:var(--muted)">クラス平均 ${classAvg}%</span>`:''}
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${s.pct}%;background:${bar}"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${s.date}</div>
    </div>`;
  }).join('');
}

function renderStudentTestsTab(){
  const num=currentUser.number;
  const el=document.getElementById('student-tests-list');
  if(!tests.length){el.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted)">テストがありません</div>';return;}

  el.innerHTML=tests.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
    const mySub=submissions.find(s=>s.testId===t.id&&s.studentNumber===num&&!s.isRetest);
    const myRetest=submissions.find(s=>s.testId===t.id&&s.studentNumber===num&&s.isRetest);
    const allSubs=submissions.filter(s=>s.testId===t.id&&!s.isRetest);
    const classAvg=allSubs.length?Math.round(allSubs.reduce((a,s)=>a+s.pct,0)/allSubs.length):null;
    const dlBadge=t.deadline
      ? (isDeadlinePassed(t)
          ? '<span class="dl-badge dl-over">期限切れ</span>'
          : `<span class="dl-badge dl-warn">⏰ ${deadlineLabel(t)}</span>`)
      : '';

    if(!mySub){
      return `<div class="test-row">
        <div style="font-weight:700;font-size:14px;margin-bottom:4px">${t.name} ${dlBadge}</div>
        <div style="font-size:12px;color:var(--muted)">${t.date} · 満点${t.maxScore}点</div>
        <div style="margin-top:8px;font-size:13px;color:var(--muted)">— 未入力</div>
      </div>`;
    }

    const bar=pctColor(mySub.pct);
    const rank=allSubs.filter(x=>x.score>mySub.score).length+1;
    const medal=rank===1?'medal-1':rank===2?'medal-2':rank===3?'medal-3':'medal-n';
    const retestHtml=myRetest
      ? `<div style="margin-top:8px;padding:8px 12px;background:var(--blue-pale);border-radius:8px;font-size:12px;color:var(--blue);font-weight:600">
           🔄 再テスト: ${myRetest.score}/${t.maxScore}点 (${myRetest.pct}%) ${myRetest.needsRetest?'⚠️':'✅'}
         </div>` : '';

    return `<div class="test-row">
      <div class="test-row-header">
        <div class="test-row-name">${t.name}</div>
        <span class="badge ${mySub.needsRetest?'badge-red':'badge-green'}">${mySub.needsRetest?'再テスト':'✓ 合格'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">
        <span class="score-display" style="color:${bar}">${mySub.score}<span style="font-size:13px;color:var(--muted)">/${t.maxScore}</span></span>
        <span style="font-weight:700;color:${bar}">${mySub.pct}%</span>
        <span class="rank-medal ${medal}">${rank}</span>
        <span style="font-size:12px;color:var(--muted)">/${allSubs.length}人中</span>
        ${classAvg!==null?`<span style="font-size:12px;color:var(--muted)">クラス平均 ${classAvg}%</span>`:''}
      </div>
      <div class="progress-bg" style="margin-bottom:4px"><div class="progress-fill" style="width:${mySub.pct}%;background:${bar}"></div></div>
      <div style="font-size:11px;color:var(--muted)">${t.date} · 合格ライン ${t.threshold}%</div>
      ${retestHtml}
    </div>`;
  }).join('');
}

function renderStudentRankingTab(){
  // 平均ランキング
  const num=currentUser.number;
  const allAvgs=students.map(s=>({num:s.number,name:s.name,avg:studentAvgPct(s.number)}))
    .filter(x=>x.avg!==null).sort((a,b)=>b.avg-a.avg);
  const el=document.getElementById('student-avg-ranking');
  if(!allAvgs.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--muted)">データがありません</div>';return;}

  el.innerHTML=allAvgs.map((s,i)=>{
    const rank=i+1;
    const medal=rank===1?'medal-1':rank===2?'medal-2':rank===3?'medal-3':'medal-n';
    const isMe=s.num===num;
    const bar=pctColor(s.avg);
    return `<div class="ranking-row${isMe?' me':''}">
      <span class="rank-medal ${medal}">${rank}</span>
      <span style="flex:1;font-weight:${isMe?'700':'500'}">${s.name}${isMe?' 👈':''}</span>
      <span style="font-family:var(--mono);font-weight:700;color:${bar}">${s.avg}%</span>
      <div class="progress-bg" style="width:80px"><div class="progress-fill" style="width:${s.avg}%;background:${bar}"></div></div>
    </div>`;
  }).join('');

  renderStudentTestRanking();
}

function renderStudentTestRanking(){
  const num=currentUser.number;
  const tid=parseInt(document.getElementById('student-rank-sel').value);
  const t=tests.find(x=>x.id===tid);
  const el=document.getElementById('student-test-ranking');
  if(!t){el.innerHTML='';return;}

  const allSubs=submissions.filter(s=>s.testId===tid&&!s.isRetest).sort((a,b)=>b.score-a.score);
  if(!allSubs.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)">まだデータがありません</div>';return;}

  const classAvg=Math.round(allSubs.reduce((a,s)=>a+s.pct,0)/allSubs.length);
  el.innerHTML=`<div style="font-size:12px;color:var(--muted);margin-bottom:12px">クラス平均 <strong>${classAvg}%</strong> · ${allSubs.length}名</div>`
    +allSubs.map((s,i)=>{
      const rank=i+1;
      const medal=rank===1?'medal-1':rank===2?'medal-2':rank===3?'medal-3':'medal-n';
      const isMe=s.studentNumber===num;
      const bar=pctColor(s.pct);
      return `<div class="ranking-row${isMe?' me':''}">
        <span class="rank-medal ${medal}">${rank}</span>
        <span style="flex:1;font-weight:${isMe?'700':'400'}">${s.studentName}${isMe?' 👈':''}</span>
        <span style="font-family:var(--mono);font-weight:700;color:${bar};min-width:60px;text-align:right">${s.score}/${t.maxScore}</span>
        <span style="font-weight:700;color:${bar};min-width:42px;text-align:right">${s.pct}%</span>
      </div>`;
    }).join('');
}

// ════ ADMIN ════
function adminTab(tab){
  document.querySelectorAll('.admin-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.admin-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('admin-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab==='dash')     renderAdminDash();
  if(tab==='entry')    initEntryTab();
  if(tab==='tests')    renderTestManage();
  if(tab==='ranking')  renderRankSel();
  if(tab==='history')  renderHistory();
  if(tab==='calendar') renderCal();
  if(tab==='students') renderStudents();
}

function renderAdminDash(){
  const totalSubs=submissions.filter(s=>!s.isRetest).length;
  const allPct=submissions.filter(s=>!s.isRetest).map(s=>s.pct);
  const avgPct=allPct.length?Math.round(allPct.reduce((a,b)=>a+b,0)/allPct.length):0;
  const retestN=submissions.filter(s=>s.needsRetest&&!s.isRetest).length;
  const overdue=getOverdueList();

  document.getElementById('admin-stats').innerHTML=`
    <div class="stat-box"><div class="stat-num">${tests.length}</div><div class="stat-label">テスト数</div></div>
    <div class="stat-box"><div class="stat-num">${students.length}</div><div class="stat-label">生徒数</div></div>
    <div class="stat-box"><div class="stat-num">${totalSubs}</div><div class="stat-label">入力済</div></div>
    <div class="stat-box"><div class="stat-num" style="color:${pctColor(avgPct)}">${avgPct}%</div><div class="stat-label">全体平均</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--red)">${retestN}</div><div class="stat-label">再テスト対象</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--orange)">${overdue.length}</div><div class="stat-label">期限切れ未入力</div></div>
  `;

  const retestEl=document.getElementById('admin-retest');
  const rs=submissions.filter(s=>s.needsRetest&&!s.isRetest);
  retestEl.innerHTML=rs.length
    ? rs.slice(0,8).map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-weight:700;flex:1">${s.studentName}</span>
        <span style="font-size:11px;color:var(--muted);flex:1">${s.testName}</span>
        <span class="badge badge-red">${s.pct}%</span></div>`).join('')
      +`<div style="margin-top:6px;font-size:12px;color:var(--muted);text-align:right">計${rs.length}件</div>`
    : '<div style="text-align:center;padding:20px;color:var(--muted)">なし ✓</div>';

  const recent=[...submissions].sort((a,b)=>b.submittedAt.localeCompare(a.submittedAt)).slice(0,6);
  document.getElementById('admin-recent').innerHTML=recent.length
    ? recent.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1"><div style="font-weight:700;font-size:13px">${s.studentName}</div><div style="font-size:11px;color:var(--muted)">${s.testName}</div></div>
        <span class="badge ${s.pct>=80?'badge-green':'badge-red'}">${s.pct}%</span></div>`).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted)">まだありません</div>';

  const overdueEl=document.getElementById('admin-overdue');
  if(!overdue.length){overdueEl.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)">なし ✓</div>';return;}
  const groups={};
  overdue.forEach(o=>{if(!groups[o.test.id])groups[o.test.id]={test:o.test,students:[]};groups[o.test.id].students.push(o.student);});
  overdueEl.innerHTML=Object.values(groups).map(g=>{
    const dlStr=new Date(g.test.deadline).toLocaleString('ja',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `<div style="margin-bottom:14px">
      <div style="font-weight:700;font-size:13px;color:var(--orange);margin-bottom:6px">${g.test.name} <span style="font-weight:400;font-size:11px;color:var(--muted)">期限: ${dlStr}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${g.students.map(s=>`<span style="background:var(--orange-pale);border:1px solid #f5c090;color:var(--orange);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700">${s.number}番 ${s.name}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

// ════ ENTRY TAB ════
function initEntryTab(){
  const sel=document.getElementById('entry-test-sel');
  sel.innerHTML=tests.length
    ? [...tests].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`<option value="${t.id}">${t.date} — ${t.name}</option>`).join('')
    : '<option value="">テストがありません</option>';
  pendingScores={};
  renderEntryGrid();
}

function renderEntryGrid(){
  const tid=parseInt(document.getElementById('entry-test-sel').value);
  const type=document.getElementById('entry-type-sel').value;
  const t=tests.find(x=>x.id===tid);
  const wrap=document.getElementById('entry-grid-wrap');
  const infoEl=document.getElementById('entry-test-info');
  if(!t){wrap.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">テストを選択してください</div>';return;}

  const isRetest=(type==='retest');
  const dlStr=t.deadline
    ? ` · 期限: ${new Date(t.deadline).toLocaleString('ja',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}${isDeadlinePassed(t)?' <span class="badge badge-red" style="font-size:10px">期限切れ</span>':''}`
    : '';
  infoEl.innerHTML=`満点 ${t.maxScore}点 · 合格ライン ${t.threshold}%${dlStr} · ${isRetest?'<strong style="color:var(--red)">再テスト入力モード</strong>':'通常テスト入力モード'}`;

  pendingScores={};
  document.getElementById('entry-summary').style.display='none';

  const sortedStudents=[...students].sort((a,b)=>a.number-b.number);

  wrap.innerHTML=`<div class="score-grid" id="score-grid-inner">${
    sortedStudents.map(s=>{
      const existing=submissions.find(x=>x.testId===t.id&&x.studentNumber===s.number&&x.isRetest===isRetest);
      const existingScore=existing?existing.score:'';
      const statusClass=existing?(existing.needsRetest?'retest':'done'):'';
      const existingLabel=existing
        ? `<span class="badge ${existing.needsRetest?'badge-red':'badge-green'}" style="font-size:10px">${existing.needsRetest?'再テスト':'✓ 合格'} ${existing.pct}%</span>`
        : '<span class="badge badge-gray" style="font-size:10px">未入力</span>';
      return `<div class="score-entry-card ${statusClass}" id="ecard-${s.number}">
        <div class="student-name-label">
          <span>${s.number}番 ${s.name}</span>
          <span id="ecard-badge-${s.number}">${existingLabel}</span>
        </div>
        <div style="position:relative">
          <input class="score-inp" type="number" min="0" max="${t.maxScore}" id="escore-${s.number}"
            placeholder="—" value="${existingScore}"
            oninput="onScoreInput(${s.number},${t.maxScore},${t.threshold},this.value)"
            onfocus="this.select()">
          <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted)">/${t.maxScore}</span>
        </div>
        <div class="score-pct-sm" id="epct-${s.number}">${existing?renderPctSm(existing.pct,t.threshold,isRetest||isDeadlinePassed(t)):''}</div>
      </div>`;
    }).join('')
  }</div>
  <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button class="btn-sm btn-ghost" onclick="clearAllScoreInputs()">🗑 入力をクリア</button>
    <button class="btn-sm btn-ghost" onclick="fillAbsent()">— 未入力を「欠席」として0点に</button>
    <span style="font-size:12px;color:var(--muted)" id="entry-count-label"></span>
  </div>`;

  updateEntryCount(t.maxScore,t.threshold,isRetest||isDeadlinePassed(t));
}

function renderPctSm(pct,threshold,forceRetest){
  const col=pctColor(pct);
  const label=!forceRetest&&pct>=threshold?'✓ 合格':'⚠ 再テスト';
  return `<span style="color:${col}">${pct}% ${label}</span>`;
}

function onScoreInput(num,maxScore,threshold,val){
  const pctEl=document.getElementById('epct-'+num);
  const card=document.getElementById('ecard-'+num);
  if(val===''||val===null){
    pctEl.innerHTML='';
    card.className='score-entry-card';
    return;
  }
  const v=parseFloat(val);
  if(isNaN(v)||v<0||v>maxScore){pctEl.innerHTML='<span style="color:var(--red)">範囲外</span>';return;}
  const pct=Math.round(v/maxScore*100);
  const tid=parseInt(document.getElementById('entry-test-sel').value);
  const t=tests.find(x=>x.id===tid);
  const isRetest=(document.getElementById('entry-type-sel').value==='retest');
  const forceRetest=isRetest||isDeadlinePassed(t);
  const nr=forceRetest||pct<threshold;
  pctEl.innerHTML=renderPctSm(pct,threshold,forceRetest);
  card.className='score-entry-card '+(nr?'retest':'done');
  updateEntryCount(maxScore,threshold,forceRetest);
}

function updateEntryCount(maxScore,threshold,forceRetest){
  const sortedStudents=[...students].sort((a,b)=>a.number-b.number);
  let filled=0,pass=0,retest=0;
  sortedStudents.forEach(s=>{
    const v=document.getElementById('escore-'+s.number)?.value;
    if(v===''||v===undefined)return;
    filled++;
    const pct=Math.round(parseFloat(v)/maxScore*100);
    if(!forceRetest&&pct>=threshold)pass++;else retest++;
  });
  const lbl=document.getElementById('entry-count-label');
  if(lbl) lbl.textContent=`入力済: ${filled}/${students.length}名 · 合格: ${pass}名 · 再テスト: ${retest}名`;
}

function clearAllScoreInputs(){
  students.forEach(s=>{
    const inp=document.getElementById('escore-'+s.number);
    if(inp){inp.value='';document.getElementById('epct-'+s.number).innerHTML='';document.getElementById('ecard-'+s.number).className='score-entry-card';}
  });
  const tid=parseInt(document.getElementById('entry-test-sel').value);
  const t=tests.find(x=>x.id===tid);
  if(t){const isRetest=(document.getElementById('entry-type-sel').value==='retest');updateEntryCount(t.maxScore,t.threshold,isRetest||isDeadlinePassed(t));}
}

function fillAbsent(){
  if(!confirm('点数が未入力の生徒を「欠席 (0点)」として扱いますか？')) return;
  const tid=parseInt(document.getElementById('entry-test-sel').value);
  const t=tests.find(x=>x.id===tid); if(!t) return;
  const isRetest=(document.getElementById('entry-type-sel').value==='retest');
  students.forEach(s=>{
    const inp=document.getElementById('escore-'+s.number);
    if(inp&&inp.value===''){inp.value='0';onScoreInput(s.number,t.maxScore,t.threshold,'0');}
  });
}

function saveAllScores(){
  const tid=parseInt(document.getElementById('entry-test-sel').value);
  const t=tests.find(x=>x.id===tid); if(!t){alert('テストを選択してください');return;}
  const isRetest=(document.getElementById('entry-type-sel').value==='retest');
  const forceRetest=isRetest||isDeadlinePassed(t);

  const toSave=[];
  students.forEach(s=>{
    const val=document.getElementById('escore-'+s.number)?.value;
    if(val===''||val===undefined||val===null)return;
    const score=parseFloat(val);
    if(isNaN(score)||score<0||score>t.maxScore)return;
    const pct=Math.round(score/t.maxScore*100);
    toSave.push({student:s,score,pct,needsRetest:forceRetest||pct<t.threshold,isExpiredSubmission:isDeadlinePassed(t)&&!isRetest});
  });

  if(!toSave.length){alert('入力されたデータがありません');return;}

  // 確認表示
  const summEl=document.getElementById('entry-summary');
  const summBody=document.getElementById('entry-summary-body');
  summEl.style.display='';
  summBody.innerHTML=`<div style="margin-bottom:10px;font-size:13px;color:var(--ink2)">${t.name}（${isRetest?'再テスト':'通常'}）· <strong>${toSave.length}名分</strong>を保存します。既存データがある生徒は上書きされます。</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>出席番号</th><th>氏名</th><th>点数</th><th>達成率</th><th>状態</th></tr></thead>
      <tbody>${toSave.map(x=>`<tr>
        <td style="font-family:var(--mono)">${x.student.number}番</td>
        <td style="font-weight:700">${x.student.name}</td>
        <td style="font-family:var(--mono);font-weight:700">${x.score}/${t.maxScore}</td>
        <td style="font-weight:700;color:${pctColor(x.pct)}">${x.pct}%</td>
        <td>${x.needsRetest?'<span class="badge badge-red">再テスト</span>':'<span class="badge badge-green">✓ 合格</span>'}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>`;
  pendingScores={t,isRetest,forceRetest,toSave};
  summEl.scrollIntoView({behavior:'smooth'});
}

function confirmSaveScores(){
  const {t,isRetest,forceRetest,toSave}=pendingScores;
  const now=new Date().toISOString();
  toSave.forEach(x=>{
    // 既存を削除して新規追加（上書き）
    submissions=submissions.filter(s=>!(s.testId===t.id&&s.studentNumber===x.student.number&&s.isRetest===isRetest));
    submissions.push({
      id:Date.now()+x.student.number,
      testId:t.id,testName:t.name+(isRetest?'【再テスト】':''),
      studentNumber:x.student.number,studentName:x.student.name,
      score:x.score,maxScore:t.maxScore,threshold:t.threshold,
      pct:x.pct,needsRetest:x.needsRetest,
      isRetest,isExpiredSubmission:x.isExpiredSubmission,
      submittedAt:now,date:t.date
    });
  });
  save();
  document.getElementById('entry-summary').style.display='none';
  alert(`✅ ${toSave.length}名分の点数を保存しました！`);
  renderEntryGrid();
}

// ════ TEST MANAGE ════
function renderTestManage(){
  const today2=new Date().toISOString().split('T')[0];
  document.getElementById('t-date').value=today2;
  const el=document.getElementById('test-manage-list');
  if(!tests.length){el.innerHTML='<div class="section-card" style="margin:0;text-align:center;padding:32px;color:var(--muted)">テストがまだありません</div>';return;}
  el.innerHTML=tests.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
    const subCount=submissions.filter(s=>s.testId===t.id&&!s.isRetest).length;
    const total=students.length;
    const pct=total?Math.round(subCount/total*100):0;
    const expired=isDeadlinePassed(t);
    const dlStr=t.deadline
      ? `期限: ${new Date(t.deadline).toLocaleString('ja',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})} ${expired?'<span class="badge badge-red" style="font-size:10px">期限切れ</span>':''}`
      : '期限: 未設定';
    const overdueN=expired?students.filter(s=>!submissions.find(x=>x.testId===t.id&&x.studentNumber===s.number&&!x.isRetest)).length:0;
    return `<div class="section-card" style="margin:0 0 10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:160px">
        <div style="font-weight:700;font-size:14px">${t.name} ${expired&&overdueN?`<span class="badge badge-orange" style="font-size:10px">未入力${overdueN}名</span>`:''}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${t.date} · 満点${t.maxScore}点 · 閾値${t.threshold}% · ${dlStr}</div>
        <div style="margin-top:6px;display:flex;align-items:center;gap:8px">
          <div class="progress-bg" style="flex:1;max-width:120px"><div class="progress-fill" style="width:${pct}%;background:var(--navy)"></div></div>
          <span style="font-size:11px;color:var(--muted)">${subCount}/${total}名 入力済</span>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-sm btn-ghost" onclick="jumpToEntry(${t.id})">✏️ 入力</button>
        <button class="btn-sm btn-red" onclick="deleteTest(${t.id})">削除</button>
      </div>
    </div>`;
  }).join('');
}

function jumpToEntry(tid){
  document.querySelectorAll('.admin-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.admin-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('admin-entry').classList.add('active');
  document.querySelectorAll('.admin-nav-btn')[1].classList.add('active');
  initEntryTab();
  document.getElementById('entry-test-sel').value=tid;
  renderEntryGrid();
}

function createTest(){
  const name=document.getElementById('t-name').value.trim();
  const date=document.getElementById('t-date').value;
  const max=parseInt(document.getElementById('t-max').value);
  const thr=parseInt(document.getElementById('t-thresh').value);
  const dl=document.getElementById('t-deadline').value;
  if(!name||!date||!max){alert('テスト名・日付・満点を入力してください');return;}
  tests.push({id:Date.now(),name,date,maxScore:max,threshold:thr||80,deadline:dl||null});
  save();renderTestManage();
  document.getElementById('t-name').value='';
  document.getElementById('t-deadline').value='';
}

function deleteTest(id){
  if(!confirm('このテストと関連する提出データをすべて削除しますか？'))return;
  tests=tests.filter(t=>t.id!==id);
  submissions=submissions.filter(s=>s.testId!==id);
  save();renderTestManage();
}

// ════ RANKING ════
function renderRankSel(){
  document.getElementById('rank-sel').innerHTML=tests.length
    ?[...tests].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`<option value="${t.id}">${t.date} — ${t.name}</option>`).join('')
    :'<option>テストがありません</option>';
  renderRanking();
}

function renderRanking(){
  const tid=parseInt(document.getElementById('rank-sel').value);
  const sort=document.getElementById('rank-sort').value;
  const t=tests.find(x=>x.id===tid);
  const el=document.getElementById('ranking-content');
  if(!t){el.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted)">テストを選択してください</div>';return;}

  const expired=isDeadlinePassed(t);
  const overdueStudents=expired?students.filter(s=>!submissions.find(x=>x.testId===t.id&&x.studentNumber===s.number&&!x.isRetest)):[];
  let subs=submissions.filter(s=>s.testId===tid&&!s.isRetest);
  if(sort==='desc')subs.sort((a,b)=>b.score-a.score);
  else if(sort==='asc')subs.sort((a,b)=>a.score-b.score);
  else subs.sort((a,b)=>a.studentName.localeCompare(b.studentName,'ja'));
  const sorted=[...subs].sort((a,b)=>b.score-a.score);
  const avg=subs.length?Math.round(subs.reduce((a,b)=>a+b.score,0)/subs.length):0;
  const avgPct=subs.length?Math.round(avg/t.maxScore*100):0;

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px">
      <div class="stat-box"><div class="stat-num">${subs.length}</div><div class="stat-label">入力済</div></div>
      <div class="stat-box"><div class="stat-num">${avg}点</div><div class="stat-label">平均点</div></div>
      <div class="stat-box"><div class="stat-num" style="color:${pctColor(avgPct)}">${avgPct}%</div><div class="stat-label">平均達成率</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red)">${subs.filter(s=>s.needsRetest).length}</div><div class="stat-label">再テスト対象</div></div>
      ${expired?`<div class="stat-box"><div class="stat-num" style="color:var(--orange)">${overdueStudents.length}</div><div class="stat-label">期限切れ未入力</div></div>`:''}
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>順位</th><th>出席番号</th><th>氏名</th><th>点数</th><th>達成率</th><th>グラフ</th><th>状態</th></tr></thead>
      <tbody>
      ${subs.map(s=>{
        const rank=sorted.findIndex(x=>x.id===s.id)+1;
        const medal=rank===1?'medal-1':rank===2?'medal-2':rank===3?'medal-3':'medal-n';
        const bar=pctColor(s.pct);
        return `<tr>
          <td><span class="rank-medal ${medal}">${rank}</span></td>
          <td style="font-family:var(--mono)">${s.studentNumber}番</td>
          <td style="font-weight:700">${s.studentName}</td>
          <td style="font-family:var(--mono);font-weight:700">${s.score}/${t.maxScore}</td>
          <td style="font-weight:700;color:${bar}">${s.pct}%</td>
          <td style="min-width:80px"><div class="progress-bg"><div class="progress-fill" style="width:${s.pct}%;background:${bar}"></div></div></td>
          <td>${s.needsRetest?'<span class="badge badge-red">再テスト</span>':'<span class="badge badge-green">✓ 合格</span>'}</td>
        </tr>`;
      }).join('')}
      ${overdueStudents.map(s=>`<tr style="background:var(--orange-pale)">
        <td><span class="rank-medal medal-n">—</span></td>
        <td style="font-family:var(--mono)">${s.number}番</td>
        <td style="font-weight:700">${s.name}</td>
        <td colspan="4" style="color:var(--orange);font-size:12px;font-weight:700">⛔ 未入力（期限切れ）</td>
      </tr>`).join('')}
      </tbody>
    </table></div>`;
}

// ════ HISTORY ════
function renderHistory(){
  const q=document.getElementById('hist-q').value.toLowerCase();
  const f=document.getElementById('hist-f').value;

  if(f==='overdue'){
    const overdue=getOverdueList();
    const el=document.getElementById('history-content');
    if(!overdue.length){el.innerHTML='<div style="text-align:center;padding:48px;color:var(--muted)">期限切れ未入力者なし ✓</div>';return;}
    const groups={};
    overdue.forEach(o=>{if(!groups[o.test.id])groups[o.test.id]={test:o.test,students:[]};groups[o.test.id].students.push(o.student);});
    el.innerHTML=Object.values(groups).map(g=>{
      const dlStr=new Date(g.test.deadline).toLocaleString('ja',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<div class="section-card" style="margin:0 0 16px;border-color:#f5c090">
        <div style="font-weight:700;font-size:15px;color:var(--orange)">${g.test.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">期限: ${dlStr} · 未入力: ${g.students.length}名</div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>出席番号</th><th>氏名</th><th>状態</th></tr></thead>
          <tbody>${g.students.map(s=>`<tr><td style="font-family:var(--mono)">${s.number}番</td><td style="font-weight:700">${s.name}</td><td><span class="badge badge-orange">未入力（期限切れ）</span></td></tr>`).join('')}</tbody>
        </table></div>
      </div>`;
    }).join('');
    return;
  }

  let data=[...submissions].sort((a,b)=>b.submittedAt.localeCompare(a.submittedAt));
  if(q)data=data.filter(s=>s.testName.toLowerCase().includes(q)||s.studentName.toLowerCase().includes(q));
  if(f==='retest')data=data.filter(s=>s.needsRetest&&!s.isRetest);
  if(f==='pass')  data=data.filter(s=>!s.needsRetest&&!s.isRetest);

  const el=document.getElementById('history-content');
  if(!data.length){el.innerHTML='<div style="text-align:center;padding:48px;color:var(--muted)">該当データがありません</div>';return;}

  const groups={};
  data.forEach(s=>{if(!groups[s.testId])groups[s.testId]={name:s.testName,date:s.date,maxScore:s.maxScore,threshold:s.threshold,testId:s.testId,subs:[]};groups[s.testId].subs.push(s);});
  el.innerHTML=Object.values(groups).map(g=>{
    const t=tests.find(x=>x.id===g.testId);
    const realSubs=g.subs.filter(s=>!s.isRetest);
    const avg=realSubs.length?Math.round(realSubs.reduce((a,b)=>a+b.score,0)/realSubs.length/g.maxScore*100):0;
    return `<div class="section-card" style="margin:0 0 16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <div style="flex:1"><div style="font-weight:700;font-size:15px">${g.name}</div><div style="font-size:12px;color:var(--muted)">${g.date} · 満点${g.maxScore}点 · 閾値${g.threshold}%</div></div>
        <span class="badge ${avg>=80?'badge-green':'badge-red'}">平均 ${avg}%</span>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>出席番号</th><th>氏名</th><th>種別</th><th>点数</th><th>達成率</th><th>状態</th><th>登録日時</th></tr></thead>
        <tbody>${g.subs.map(s=>`<tr style="${s.needsRetest?'background:var(--red-pale)':''}">
          <td style="font-family:var(--mono)">${s.studentNumber}番</td>
          <td style="font-weight:700">${s.studentName}</td>
          <td>${s.isRetest?'<span class="badge badge-blue">再テスト</span>':'通常'}</td>
          <td>${s.score}/${s.maxScore}</td>
          <td><span class="badge ${s.pct>=80?'badge-green':s.pct>=60?'badge-gold':'badge-red'}">${s.pct}%</span></td>
          <td>${s.needsRetest?'<span class="badge badge-red">再テスト</span>':'<span class="badge badge-green">✓ 合格</span>'}</td>
          <td style="font-size:12px;color:var(--muted)">${new Date(s.submittedAt).toLocaleString('ja')}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  }).join('');
}

// ════ CALENDAR ════
function renderCal(){
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=`${calY}年 ${months[calM]}`;
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0);
  const startDay=first.getDay();
  const dateMap={};
  submissions.forEach(s=>{if(!dateMap[s.date])dateMap[s.date]=[];dateMap[s.date].push(s);});
  const dlMap={};
  tests.forEach(t=>{if(!t.deadline)return;const k=t.deadline.split('T')[0];if(!dlMap[k])dlMap[k]=[];dlMap[k].push(t);});
  const cells=[];
  for(let i=0;i<startDay;i++)cells.push({d:new Date(calY,calM,-startDay+i+1),cur:false});
  for(let d=1;d<=last.getDate();d++)cells.push({d:new Date(calY,calM,d),cur:true});
  while(cells.length<42)cells.push({d:new Date(calY,calM+1,cells.length-startDay-last.getDate()+1),cur:false});
  document.getElementById('cal-cells').innerHTML=cells.map(c=>{
    const key=`${c.d.getFullYear()}-${String(c.d.getMonth()+1).padStart(2,'0')}-${String(c.d.getDate()).padStart(2,'0')}`;
    const ss=dateMap[key]||[];const dls=dlMap[key]||[];
    const isToday=c.d.toDateString()===today.toDateString();
    const hasWarn=ss.some(s=>s.needsRetest&&!s.isRetest);
    const testNames=[...new Set(ss.filter(s=>!s.isRetest).map(s=>s.testName))];
    return `<div class="cal-cell${!c.cur?' other':''}${isToday?' today':''}" onclick="${c.cur&&(ss.length||dls.length)?`openCalDay('${key}')`:''}" style="${!c.cur?'pointer-events:none':''}">
      <div class="cal-num">${c.d.getDate()}</div>
      ${dls.map(t=>`<span class="cal-dot dl">${t.name.length>6?t.name.slice(0,6)+'…':t.name}〆</span>`).join('')}
      ${testNames.slice(0,2).map(n=>`<span class="cal-dot ${hasWarn?'warn':'sub'}">${n.length>6?n.slice(0,6)+'…':n}</span>`).join('')}
    </div>`;
  }).join('');
}
function calMove(dir){if(dir===0){calY=today.getFullYear();calM=today.getMonth();}else{calM+=dir;if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;}}renderCal();}
function openCalDay(dateStr){
  const ss=submissions.filter(s=>s.date===dateStr&&!s.isRetest);
  const dls=tests.filter(t=>t.deadline&&t.deadline.split('T')[0]===dateStr);
  if(!ss.length&&!dls.length)return;
  document.getElementById('cal-modal-title').textContent=`📅 ${dateStr}`;
  let html='';
  if(dls.length)html+=`<div style="margin-bottom:14px;padding:10px;background:var(--orange-pale);border:1px solid #f5c090;border-radius:10px">
    <div style="font-weight:700;color:var(--orange);margin-bottom:6px">⏰ 提出期限</div>
    ${dls.map(t=>{const oc=students.filter(s=>!submissions.find(x=>x.testId===t.id&&x.studentNumber===s.number&&!x.isRetest)).length;return`<div style="font-size:13px;font-weight:600;margin-bottom:2px">${t.name} <span style="font-weight:400;color:var(--muted)">未入力: ${oc}名</span></div>`;}).join('')}
  </div>`;
  if(ss.length){
    const groups={};ss.forEach(s=>{if(!groups[s.testId])groups[s.testId]={name:s.testName,subs:[]};groups[s.testId].subs.push(s);});
    html+=Object.values(groups).map(g=>`<div style="margin-bottom:14px">
      <div style="font-weight:700;margin-bottom:8px">${g.name}</div>
      ${g.subs.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-family:var(--mono);color:var(--muted);font-size:12px">${s.studentNumber}番</span>
        <span style="font-weight:700;flex:1">${s.studentName}</span>
        <span class="badge ${s.pct>=80?'badge-green':'badge-red'}">${s.pct}%</span>
      </div>`).join('')}
    </div>`).join('');
  }
  document.getElementById('cal-modal-body').innerHTML=html;
  document.getElementById('cal-modal').classList.add('open');
}

// ════ STUDENTS ════
function renderStudents(){
  const el=document.getElementById('student-table');
  if(!students.length){el.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted)">生徒が登録されていません</div>';return;}
  el.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>出席番号</th><th>氏名</th><th>パスワード</th><th>入力済</th><th>平均点率</th><th></th></tr></thead>
    <tbody>${[...students].sort((a,b)=>a.number-b.number).map(s=>{
      const pw='02'+String(s.number).padStart(2,'0');
      const subCount=submissions.filter(x=>x.studentNumber===s.number&&!x.isRetest).length;
      const avg=studentAvgPct(s.number);
      return `<tr id="srow-${s.number}">
        <td style="font-family:var(--mono);font-weight:700">${s.number}番</td>
        <td>
          <span id="sname-d-${s.number}" style="font-weight:700">${s.name}</span>
          <input id="sname-i-${s.number}" class="inp" type="text" value="${s.name}" style="display:none;width:140px;padding:6px 10px;font-size:13px"
            onkeydown="if(event.key==='Enter')saveName(${s.number});if(event.key==='Escape')cancelName(${s.number})">
        </td>
        <td><code style="background:var(--bg);padding:2px 8px;border-radius:5px;font-size:13px">${pw}</code></td>
        <td>${subCount}件</td>
        <td style="font-weight:700;color:${avg!==null?pctColor(avg):'var(--muted)'}">${avg!==null?avg+'%':'—'}</td>
        <td style="display:flex;gap:5px">
          <button id="sedit-${s.number}" class="btn-sm btn-ghost" onclick="startEdit(${s.number})">✏️</button>
          <button id="ssave-${s.number}" class="btn-sm btn-navy" style="display:none" onclick="saveName(${s.number})">保存</button>
          <button id="scancel-${s.number}" class="btn-sm btn-ghost" style="display:none" onclick="cancelName(${s.number})">×</button>
          <button class="btn-sm btn-red" onclick="deleteStudent(${s.number})">削除</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}
function startEdit(num){document.getElementById('sname-d-'+num).style.display='none';document.getElementById('sname-i-'+num).style.display='';document.getElementById('sedit-'+num).style.display='none';document.getElementById('ssave-'+num).style.display='';document.getElementById('scancel-'+num).style.display='';document.getElementById('sname-i-'+num).focus();}
function cancelName(num){const s=students.find(x=>x.number===num);document.getElementById('sname-i-'+num).value=s?s.name:'';document.getElementById('sname-d-'+num).style.display='';document.getElementById('sname-i-'+num).style.display='none';document.getElementById('sedit-'+num).style.display='';document.getElementById('ssave-'+num).style.display='none';document.getElementById('scancel-'+num).style.display='none';}
function saveName(num){const n=document.getElementById('sname-i-'+num).value.trim();if(!n){alert('氏名を入力してください');return;}const s=students.find(x=>x.number===num);if(!s)return;s.name=n;save();renderStudents();}
function addStudent(){const num=parseInt(document.getElementById('s-num').value);const name=document.getElementById('s-name').value.trim();if(!num||!name){alert('出席番号と氏名を入力してください');return;}if(students.find(s=>s.number===num)){alert('その出席番号はすでに登録されています');return;}students.push({number:num,name});save();renderStudents();document.getElementById('s-num').value='';document.getElementById('s-name').value='';}
function deleteStudent(num){if(!confirm('この生徒を削除しますか？'))return;students=students.filter(s=>s.number!==num);save();renderStudents();}

function changeAdminPw(){
  const cur=document.getElementById('pw-current').value;
  const np=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-confirm').value;
  const e=document.getElementById('pw-err');const ok=document.getElementById('pw-ok');
  e.classList.remove('show');ok.style.display='none';
  if(cur!==ADMIN_PW){e.textContent='現在のパスワードが違います';e.classList.add('show');return;}
  if(!np){e.textContent='新しいパスワードを入力してください';e.classList.add('show');return;}
  if(np!==cf){e.textContent='新しいパスワードが一致しません';e.classList.add('show');return;}
  ADMIN_PW=np;save();
  document.getElementById('pw-current').value='';document.getElementById('pw-new').value='';document.getElementById('pw-confirm').value='';
  ok.style.display='block';setTimeout(()=>{ok.style.display='none';},3000);
}

// ── INIT ──
document.getElementById('t-date').value=today.toISOString().split('T')[0];
if(!students.length){for(let i=1;i<=10;i++)students.push({number:i,name:`生徒${i}番`});save();}
</script>
